<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सहचर ओम्नी AI</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, #f0f4f8, #fffaf0); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; max-width: 550px; border: 1px solid #b45309; }
        h1 { color: #b45309; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .sub { color: #5f259f; font-size: 1.2rem; margin-bottom: 1.5rem; }
        p { color: #2c3e50; line-height: 1.6; }
        code { background: #f0f0f0; padding: 0.3rem 0.6rem; border-radius: 8px; color: #b45309; }
        .footer { margin-top: 2rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌿 सहचर ओम्नी AI</h1>
        <div class="sub">बहु-उद्देश्यीय AI प्लेटफॉर्म</div>
        <p>✨ बैकएंड सफलतापूर्वक चालू है।</p>
        <p>🔹 API endpoints उपलब्ध हैं:</p>
        <p><code>/api/chat/send</code> – चैट <br>
           <code>/api/image/generate</code> – इमेज जनरेशन <br>
           <code>/api/audio/transcribe</code> – ऑडियो ट्रांसक्रिप्शन <br>
           <code>/api/video/generate</code> – वीडियो जनरेशन</p>
        <p>🙏 जय भीम, नमो बुद्धाय!</p>
        <div class="footer">सहचर टीम द्वारा निर्मित</div>
    </div>
</body>
</html>
